[package]
name = "gcalics"
version = "1.0.0"
edition = "2021"
description = "gcal .ics file-association launcher"
authors = ["Bob Frankston"]

[[bin]]
name = "gcalics"
path = "src/main.rs"

[build-dependencies]
winres = "0.1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
